name: Refrescar datos (rebuild Netlify)

# Dispara una reconstrucción en Netlify para que vuelva a descargar los datos
# de Smogon/PokeAPI (npm run build los regenera en el servidor de Netlify).
on:
  schedule:
    # Cada día a las 09:00 UTC (rebuild diario para coger datos frescos de Smogon/PokeAPI).
    - cron: '0 9 * * *'
  workflow_dispatch: {} # permite lanzarlo a mano desde la pestaña Actions

jobs:
  trigger-netlify:
    runs-on: ubuntu-latest
    steps:
      - name: Lanzar build hook de Netlify
        env:
          NETLIFY_HOOK: ${{ secrets.NETLIFY_HOOK }}
        run: |
          if [ -z "$NETLIFY_HOOK" ]; then
            echo "::error::El secret NETLIFY_HOOK no está definido. Créalo en Settings > Secrets and variables > Actions."
            exit 1
          fi
          curl -fsSL -X POST -d '{}' "$NETLIFY_HOOK"
