name: Build y deploy a GitHub Pages

# Construye en GitHub Actions (minutos gratis) y publica el sitio ya hecho en
# GitHub Pages. No usa Netlify, así que no gasta minutos de build de Netlify.
on:
  push:
    branches: [main]
  schedule:
    # Lunes 09:00 UTC: refresca los datos de Smogon/PokeAPI (npm run build los regenera).
    - cron: '0 9 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues solapados; deja terminar el que esté en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # SPA: cualquier ruta desconocida devuelve la app (React Router se encarga).
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
